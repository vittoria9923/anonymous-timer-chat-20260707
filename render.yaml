services:
  - type: web
    name: anonymous-timer-chat
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGINS
        value: https://anonymous-timer-chat-20260707.netlify.app
